<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" version="1.1" width="100" height="100">
  <defs>
    <linearGradient id="titleGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#111a16;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0a0f0d;stop-opacity:1"/>
    </linearGradient>
  </defs>

  <!-- Title bar -->
  <rect id="titlebar-active" x="0" y="0" width="100" height="30" fill="url(#titleGradient)" stroke="#1f3a2d" stroke-width="1"/>
  <rect id="titlebar-inactive" x="0" y="0" width="100" height="30" fill="#0d1411" stroke="#2e4d3c" stroke-width="1"/>

  <!-- Borders -->
  <rect id="border-left" x="0" y="30" width="1" height="70" fill="#1f3a2d"/>
  <rect id="border-right" x="99" y="30" width="1" height="70" fill="#1f3a2d"/>
  <rect id="border-bottom" x="0" y="99" width="100" height="1" fill="#1f3a2d"/>

  <!-- Corner pieces -->
  <rect id="corner-top-left" x="0" y="0" width="8" height="8" fill="#111a16" stroke="#1f3a2d" stroke-width="1"/>
  <rect id="corner-top-right" x="92" y="0" width="8" height="8" fill="#111a16" stroke="#1f3a2d" stroke-width="1"/>
  <rect id="corner-bottom-left" x="0" y="92" width="8" height="8" fill="#0a0f0d" stroke="#1f3a2d" stroke-width="1"/>
  <rect id="corner-bottom-right" x="92" y="92" width="8" height="8" fill="#0a0f0d" stroke="#1f3a2d" stroke-width="1"/>
</svg>